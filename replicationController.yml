# ============================================================
# REPLICATION CONTROLLER - KUBERNETES MANIFEST
# ============================================================
# Purpose: This file defines a Replication Controller that ensures
#          a specified number of pod replicas are always running.
#
# Key Concept: If a pod crashes, RC automatically creates a new one
#              to maintain the desired replica count.
# ============================================================

apiVersion: v1                    # Kubernetes API version

kind: ReplicationController       # Object type: Replication Controller
                                  # (Ensures pod replicas are maintained)

# ============================================================
# SECTION 1: METADATA (RC Information)
# ============================================================
metadata:
  name: my-replicationcontroller  # Name of this RC
                                  # Note: Use lowercase letters only
                                  # This is used to reference the RC

# ============================================================
# SECTION 2: SPECIFICATION (RC Configuration)
# ============================================================
spec:
  # --- 2.1 Desired Replica Count ---
  # What: Number of pod copies that should be running at all times
  # Example: If set to 4, RC will create/maintain 4 identical pods
  replicas: 4
  
  
  # --- 2.2 Pod Selector (Identifies Managed Pods) ---
  # What: Labels used to identify which pods this RC manages
  # How it works:
  #   - RC looks for pods with matching labels
  #   - Pods with matching labels are "adopted" by this RC
  #   - RC ensures the number of matching pods = replicas count
  selector:
    app: python-app              # Label key-value pair to match
                                 # Only pods with label "app: python-app"
                                 # will be managed by this RC

  
  # --- 2.3 Pod Template (Blueprint for Creating Pods) ---
  # What: Template used to create new pods when needed
  # When used: RC uses this when scaling up or replacing failed pods
  template:
    
    # --- 2.3.1 Pod Metadata ---
    metadata:
      labels:                     # Labels assigned to created pods
        app: python-app           # IMPORTANT: Must match selector!
                                  # This label links pods to the RC
    
    # --- 2.3.2 Pod Specification ---
    spec:
      containers:                 # List of containers in the pod
        
        # --- Container 1 Configuration ---
        - name: container-1       # Name of the container
          
          # --- Container Image ---
          # Format: [registry]/[repository]:[tag]
          # Docker Hub format: username/image-name:version
          image: saikiran012/python-images:python-static-image-v1
          
          # --- Container Ports ---
          # What: Ports that the application listens on
          # Note: This is informational (not required for networking)
          ports:
            - containerPort: 5000 # Application running on port 5000
                                  # (Python Flask/Django app typically)


# ============================================================
# SECTION 3: QUICK REFERENCE - HOW RC WORKS
# ============================================================
#
# WORKFLOW:
# 1. RC is created with 4 replicas specified
# 2. RC checks for pods with label "app: python-app"
# 3. If < 4 pods exist: RC creates new pods using the template
# 4. If > 4 pods exist: RC deletes extra pods
# 5. If a pod crashes: RC creates a new one automatically
# 6. If a pod is deleted: RC creates a replacement
#
# COMMANDS TO MANAGE THIS RC:
#
# View RC:
#   kubectl get rc
#   kubectl describe rc my-replicationcontroller
#
# Scale up to 6 replicas:
#   kubectl scale rc my-replicationcontroller --replicas=6
#
# Scale down to 2 replicas:
#   kubectl scale rc my-replicationcontroller --replicas=2
#
# Delete RC (and its pods):
#   kubectl delete rc my-replicationcontroller
#
# Delete RC but keep pods running:
#   kubectl delete rc my-replicationcontroller --cascade=orphan
#
# ============================================================

# ============================================================
# SECTION 4: KEY LEARNING POINTS
# ============================================================
#
# 1. LABELS ARE CRITICAL
#    - selector.app must match template.metadata.labels.app
#    - This connection determines which pods RC manages
#
# 2. REPLICATION CONTROLLER vs DEPLOYMENT
#    - RC: Older technology, still works
#    - Deployment: Modern approach (uses ReplicaSet internally)
#    - Recommendation: Use Deployment for new projects
#
# 3. REPLICA COUNT
#    - RC continuously monitors and maintains this count
#    - Change replicas to scale up/down: kubectl scale
#
# 4. SELF-HEALING
#    - If a pod dies: RC creates a new one
#    - If pod is deleted manually: RC creates a replacement
#    - This ensures high availability
#
# 5. POD TEMPLATE
#    - Used as blueprint every time a new pod is created
#    - Change template requires rollout of new pods
#
# ============================================================
