apiVersion: v1
kind: ReplicationController
metadata:
  name: my-replicationcontroller #use small letters only
spec:
  replicas: 4
  selector:
    app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: container-1
          image: saikiran012/python-images:python-static-image-v1
          ports:
            - containerPort: 5000
    
