# ============================================================================
# KUBERNETES HORIZONTAL POD AUTOSCALER (HPA) CONFIGURATION
# ============================================================================
# HPA automatically scales the number of pods based on observed metrics
# Purpose: Maintain performance under varying load, reduce costs during low usage
# ============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

# ============================================================================
# 1. METADATA SECTION
# ============================================================================
# Defines the identity and organization of the HPA resource
metadata:
  # Name: Unique identifier for this HPA within the namespace
  name: micro-ui-app-autoscaling
  
  # Namespace: Logical cluster partition (default: 'default' if omitted)
  namespace: default
  
  # Labels: Key-value pairs for organizing and selecting resources
  labels:
    app: micro-ui-app        # Application name
    component: autoscaling   # Component type
    environment: production  # Environment classification
  
  # Annotations: Metadata for documentation
  annotations:
    description: "Auto-scaling configuration for micro-ui-app"
    managed-by: "devops-team"
    documentation: "https://docs.example.com/micro-ui-app-scaling"

# ============================================================================
# 2. SPEC SECTION - HPA Configuration
# ============================================================================
spec:
  
  # ========== SCALE TARGET REFERENCE ==========
  # Which resource to scale (Deployment, StatefulSet, etc.)
  scaleTargetRef:
    # API version of the target resource
    apiVersion: apps/v1
    
    # Kind: Type of resource to scale (Deployment, StatefulSet, ReplicaSet)
    kind: Deployment
    
    # Name: Resource name to scale
    name: micro-ui-app
  
  # ========== REPLICA LIMITS ==========
  # Minimum number of pods to maintain
  # Even under low load, at least this many pods will run
  minReplicas: 2
  
  # Maximum number of pods to scale up to
  # Limits resource consumption and costs
  maxReplicas: 10
  
  # Desired number of replicas (target)
  # HPA tries to maintain metrics at this target
  # If not specified, no target replicas
  # desiredReplicas: 5
  
  # ========== METRICS FOR SCALING ==========
  # Conditions that trigger scaling decisions
  metrics:
  
  # ----- METRIC 1: CPU UTILIZATION -----
  - type: Resource
    resource:
      # Metric name: cpu or memory
      name: cpu
      target:
        # Utilization: Percentage of requested CPU
        # AverageUtilization: Average CPU used across all pods
        type: Utilization
        averageUtilization: 50  # Scale up when CPU > 50%
  
  # ----- METRIC 2: MEMORY UTILIZATION (Optional) -----
  # Uncomment to also scale on memory
  # - type: Resource
  #   resource:
  #     name: memory
  #     target:
  #       type: Utilization
  #       averageUtilization: 70  # Scale up when Memory > 70%
  
  # ----- METRIC 3: CUSTOM METRICS (Optional) -----
  # Scale based on custom application metrics (requires metrics server)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "1000"  # Scale up when requests > 1000/sec
  
  # ----- METRIC 4: EXTERNAL METRICS (Optional) -----
  # Scale based on external metrics (queue length, etc.)
  # - type: External
  #   external:
  #     metric:
  #       name: queue_length
  #       selector:
  #         matchLabels:
  #           queue_name: primary
  #     target:
  #       type: AverageValue
  #       averageValue: "30"  # Scale up when queue > 30 messages
  
  # ========== SCALING BEHAVIOR (Optional) ==========
  # Control how fast and how much to scale
  behavior:
    # Scale-up behavior
    scaleUp:
      stabilizationWindowSeconds: 0  # How long to wait before scaling up
      policies:
      - type: Percent
        value: 50                      # Increase by 50% of current pods
        periodSeconds: 15              # Every 15 seconds
      - type: Pods
        value: 2                       # OR increase by 2 pods
        periodSeconds: 15              # Every 15 seconds
      # selectPolicy: Max (default) means use whichever is largest
    
    # Scale-down behavior
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 10                      # Decrease by 10% of current pods
        periodSeconds: 60              # Every 60 seconds
      - type: Pods
        value: 1                       # OR decrease by 1 pod
        periodSeconds: 60              # Every 60 seconds

# ============================================================================
# KEY CONCEPTS & BEST PRACTICES
# ============================================================================
# 
# 1. HPA PREREQUISITES
#    - Metrics Server must be installed in cluster
#    - Pods must have resource requests defined
#    - HPA uses requests to calculate utilization percentages
#    - Formula: Utilization = (Actual Usage / Requested) * 100
#
# 2. MINIMUM REPLICAS
#    - Ensures minimum availability and capacity
#    - At least this many pods always run (even at night)
#    - Balance: Cost vs. availability
#    - Recommended: minReplicas >= 2 for high availability
#
# 3. MAXIMUM REPLICAS
#    - Prevents excessive scaling and resource exhaustion
#    - Cost control: Limits maximum cloud spend
#    - Safety: Prevents cascading failures from scale explosions
#    - Should be high enough for peak expected load
#
# 4. SCALING TRIGGERS
#    - Scaling happens when avg metric exceeds target for stabilization window
#    - Metrics evaluated every 15 seconds (default)
#    - Stabilization window prevents flapping (rapid scale up/down)
#    - Multiple metrics: Scale if ANY metric is above target
#
# 5. SCALE-UP BEHAVIOR
#    - stabilizationWindowSeconds: 0 means scale immediately (aggressive)
#    - Policies define how much to scale per period
#    - selectPolicy: Max means take largest increase from all policies
#    - Fast scale-up important for handling sudden traffic spikes
#
# 6. SCALE-DOWN BEHAVIOR
#    - stabilizationWindowSeconds: 300 (5 min) prevents rapid downscaling
#    - Prevents cost oscillations from brief load drops
#    - Slower scale-down = more stable cost but more waste during low load
#    - Adjust based on application requirements
#
# 7. RESOURCE REQUESTS
#    - REQUIRED for HPA to work properly
#    - Utilization % = (Actual Usage / Requested) * 100
#    - Example: Pod requests 100m CPU, uses 50m → 50% utilization
#    - Without requests: HPA uses absolute values (less predictable)
#
# 8. MULTIPLE METRICS
#    - HPA scales if ANY metric is above target
#    - Use case: CPU + Memory (scale if either is high)
#    - Custom metrics: Application-specific (requests/sec, connections, etc.)
#    - External metrics: Outside the cluster (SQS queue length, etc.)
#
# 9. API VERSIONS
#    - autoscaling/v1: Only supports CPU utilization (deprecated)
#    - autoscaling/v2: Supports multiple metrics (recommended)
#    - autoscaling/v2beta2: Beta version (don't use)
#
# ============================================================================
# SCALING DECISION FORMULA
# ============================================================================
# HPA recalculates desired replicas every ~15 seconds:
#
# desiredReplicas = ceil[currentReplicas * (currentMetric / targetMetric)]
#
# Example:
#   - Current replicas: 3
#   - Current CPU utilization: 75%
#   - Target CPU utilization: 50%
#   - desiredReplicas = ceil[3 * (75/50)] = ceil[4.5] = 5
#   - Result: Scale up to 5 replicas
#
# ============================================================================
# USEFUL KUBECTL COMMANDS
# ============================================================================
#
# Create HPA:
#   kubectl apply -f hpa.yml
#
# View HPA Status:
#   kubectl get hpa
#   kubectl get hpa micro-ui-app-autoscaling
#   kubectl describe hpa micro-ui-app-autoscaling
#   kubectl get hpa micro-ui-app-autoscaling -o yaml
#
# Watch HPA in Action:
#   kubectl get hpa --watch
#   watch kubectl get hpa,deploy -l app=micro-ui-app
#
# View Scaling History:
#   kubectl describe hpa micro-ui-app-autoscaling  # Shows recent scaling events
#   kubectl get events --field-selector involvedObject.name=micro-ui-app-autoscaling
#
# Manually Scale Deployment (HPA will adjust):
#   kubectl scale deployment micro-ui-app --replicas=5
#
# Update HPA Metrics:
#   kubectl set resources deployment micro-ui-app --requests=cpu=200m,memory=256Mi
#
# Delete HPA:
#   kubectl delete hpa micro-ui-app-autoscaling
#
# Check Metrics Server:
#   kubectl get deployment metrics-server -n kube-system
#   kubectl get nodes --show-metrics  # Requires metrics server
#
# Debug HPA:
#   kubectl top pods -l app=micro-ui-app  # View actual resource usage
#   kubectl top nodes  # View node resource usage
#   kubectl describe hpa  # Shows current metrics and status
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# HPA not scaling?
#   1. Check if Metrics Server is running: kubectl get deployment metrics-server -n kube-system
#   2. Verify pods have resource requests: kubectl describe pod <pod-name>
#   3. Check HPA status: kubectl describe hpa <hpa-name>
#   4. View recent events: kubectl get events
#
# Metrics showing as Unknown?
#   - Metrics Server not installed or not ready
#   - Pod hasn't been running long enough for metrics collection
#   - Container doesn't have requests defined
#   - Metrics haven't been collected yet (wait ~1 minute after pod startup)
#
# HPA scaling too aggressively?
#   - Increase stabilizationWindowSeconds
#   - Reduce scale-up policies
#   - Increase minReplicas to avoid reaching maxReplicas
#   - Increase target metric threshold
#
# HPA not scaling down?
#   - Increase stabilizationWindowSeconds for scale-down
#   - Check if metrics are actually below target
#   - Verify minReplicas isn't preventing scale-down
#
# ============================================================================
