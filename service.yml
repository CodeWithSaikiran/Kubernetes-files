# ============================================================================
# KUBERNETES SERVICE CONFIGURATION
# ============================================================================
# A Service provides network access to a set of Pods
# Purpose: Service discovery, load balancing, stable network endpoint
# ============================================================================

# ============================================================================
# SERVICE TYPE 1: ClusterIP (Default - Internal Communication Only)
# ============================================================================
# Use Case: Internal communication between pods/services within the cluster
# Access: Only from within the cluster (no external access)
# Best For: Backend services, microservices communication

apiVersion: v1
kind: Service
metadata:
  name: myservice-clusterip
  namespace: default
  labels:
    app: python-app
    service-type: clusterip
  annotations:
    description: "Internal service for python app"
    managed-by: "devops-team"

spec:
  # Service Type: ClusterIP (default)
  type: ClusterIP
  
  # Cluster IP: Assign specific IP (optional, auto-assigned if omitted)
  # clusterIP: 10.0.0.1
  
  # Session Affinity: Route from same client to same pod
  # clientIP: Sticky sessions based on client IP
  # None (default): No session affinity (each request can go to different pod)
  sessionAffinity: None
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800  # 3 hours
  
  # Port Mapping Configuration
  ports:
  - name: http                # Port name (referenced by other services)
    port: 1111                # Service port (exposed within cluster)
    targetPort: 5000          # Container port (backend pod port)
    protocol: TCP             # Protocol: TCP or UDP
  
  # Selector: Which pods this service routes to
  # Service sends traffic to pods matching these labels
  selector:
    app: python-app           # Must match pod labels

---
# ============================================================================
# SERVICE TYPE 2: NodePort (External Access via Node Port)
# ============================================================================
# Use Case: External access to services running on every node
# Access: From outside cluster via <NodeIP>:<NodePort>
# Port Range: 30000-32767 (fixed range)
# Best For: Development, testing, external access without load balancer

apiVersion: v1
kind: Service
metadata:
  name: myservice-nodeport
  namespace: default
  labels:
    app: python-app
    service-type: nodeport
  annotations:
    description: "NodePort service for python app - accessible from outside cluster"
    managed-by: "devops-team"

spec:
  # Service Type: NodePort
  # Creates a ClusterIP automatically, plus NodePort on all nodes
  type: NodePort
  
  # Session Affinity (optional)
  sessionAffinity: None
  
  # External Traffic Policy: How external traffic is routed
  # Cluster (default): Route to any pod in any node (may cross nodes)
  # Local: Route only to pods on the same node (preserves source IP)
  externalTrafficPolicy: Cluster
  # externalTrafficPolicy: Local  # Recommended for preserving source IP
  
  # Port Mapping Configuration
  ports:
  - name: http                # Port name
    port: 1111                # Service port (used for ClusterIP access)
    targetPort: 5000          # Container port (backend pod port)
    nodePort: 30001           # Node port (externally accessible)
                              # Range: 30000-32767
                              # If not specified: auto-assigned from range
    protocol: TCP             # Protocol: TCP or UDP
  
  # Selector: Which pods this service routes to
  selector:
    app: python-app           # Must match pod labels

---
# ============================================================================
# SERVICE TYPE 3: LoadBalancer (External Access via Cloud Load Balancer)
# ============================================================================
# Use Case: Production external access to services
# Access: From outside cluster via stable external IP address
# Availability: Requires cloud provider support (AWS, GCP, Azure, etc.)
# Best For: Production, public-facing services, stable external endpoint

apiVersion: v1
kind: Service
metadata:
  name: myservice-loadbalancer
  namespace: default
  labels:
    app: python-app
    service-type: loadbalancer
  annotations:
    description: "LoadBalancer service for python app - production external access"
    managed-by: "devops-team"
    service.spec.loadBalancerIP: ""  # Cloud provider specific

spec:
  # Service Type: LoadBalancer
  # Creates NodePort and LoadBalancer automatically
  # Cloud provider provisions external load balancer
  type: LoadBalancer
  
  # Load Balancer IP (optional)
  # Static IP address for load balancer (if provider supports it)
  # loadBalancerIP: 203.0.113.1
  
  # Session Affinity (optional)
  sessionAffinity: None
  
  # External Traffic Policy
  # Cluster (default): Route to any pod (may cross nodes)
  # Local: Route only to pods on same node (preserves source IP)
  externalTrafficPolicy: Cluster
  # externalTrafficPolicy: Local  # Recommended for source IP preservation
  
  # Health Check Configuration (optional, cloud provider specific)
  # healthCheckNodePort: 31000  # Port used for load balancer health checks
  
  # Port Mapping Configuration
  ports:
  - name: http                # Port name
    port: 1111                # Service port (exposed externally)
    targetPort: 5000          # Container port (backend pod port)
    # nodePort: 30001         # NodePort (optional, auto-assigned if omitted)
    protocol: TCP             # Protocol: TCP or UDP
  
  # Load Balancer Source Ranges (optional)
  # Restrict traffic to these CIDR blocks
  # loadBalancerSourceRanges:
  # - 203.0.113.0/24          # Only allow from this subnet
  # - 198.51.100.0/24         # Only allow from this subnet
  
  # Selector: Which pods this service routes to
  selector:
    app: python-app           # Must match pod labels

---
# ============================================================================
# BONUS SERVICE TYPE 4: ExternalName (DNS CNAME)
# ============================================================================
# Use Case: Route to external service outside cluster
# Access: Cluster DNS resolves service name to external DNS name
# Best For: Accessing external databases, APIs, legacy systems

# apiVersion: v1
# kind: Service
# metadata:
#   name: external-database
#   namespace: default
# spec:
#   type: ExternalName
#   # Maps service name to external DNS name via CNAME
#   externalName: db.example.com  # External service address
#   ports:
#   - port: 5432
#     targetPort: 5432
#     protocol: TCP

# ============================================================================
# KEY CONCEPTS & BEST PRACTICES
# ============================================================================
# 
# 1. SERVICE TYPES COMPARISON
#    ┌─────────────────┬────────────────┬──────────────┬────────────┐
#    │ Type            │ Access Scope   │ External IP  │ Use Case   │
#    ├─────────────────┼────────────────┼──────────────┼────────────┤
#    │ ClusterIP       │ Internal only  │ None         │ Internal   │
#    │ NodePort        │ External       │ Node IP      │ Dev/Test   │
#    │ LoadBalancer    │ External       │ Cloud LB IP  │ Production │
#    │ ExternalName    │ External DNS   │ CNAME        │ External   │
#    └─────────────────┴────────────────┴──────────────┴────────────┘
#
# 2. PORT TERMINOLOGY
#    - port: Service port (external for LoadBalancer/NodePort)
#    - targetPort: Container port inside pod
#    - nodePort: Host port on every node (NodePort/LoadBalancer)
#    - Example: External requests to :1111 routed to pod :5000
#
# 3. SELECTORS & LABELS
#    - Service uses selector.labels to find target pods
#    - Service sends traffic to pods matching ALL selector labels
#    - Label must exactly match pod's metadata.labels
#    - Multiple labels: pod must have all labels in selector
#
# 4. LOAD BALANCING
#    - Service acts as load balancer for its pods
#    - Round-robin default distribution
#    - Session affinity available (sticky sessions)
#    - No session affinity: Each request may go to different pod
#
# 5. CLUSTERIP SERVICE
#    - Default service type (doesn't need specification)
#    - Only accessible from within cluster
#    - Best for backend services, microservices communication
#    - Most secure (no external exposure)
#
# 6. NODEPORT SERVICE
#    - Opens port on every node in cluster
#    - External requests: <NodeIP>:<NodePort>
#    - Port range limited to 30000-32767
#    - Each node has same port open
#    - Development/testing choice (not production)
#
# 7. LOADBALANCER SERVICE
#    - Production choice for external access
#    - Cloud provider provisions external load balancer
#    - Stable external IP address (not node IP)
#    - Automatic health checks
#    - Only works with cloud providers supporting it
#    - Cost: Cloud provider charges for load balancer
#
# 8. SOURCE IP PRESERVATION
#    - externalTrafficPolicy: Cluster (default)
#      * Routes to any pod (may cross nodes)
#      * Source IP appears as pod IP, not original client
#    - externalTrafficPolicy: Local (recommended)
#      * Routes only to pods on same node
#      * Preserves original client source IP
#      * Extra hop if no pods on that node
#
# 9. EXTERNAL TRAFFIC POLICY
#    - Cluster: Better load distribution
#    - Local: Better for source IP logging/security
#    - Choose based on application requirements
#
# 10. LOAD BALANCER SOURCE RANGES
#     - Optional security feature
#     - Restricts traffic to specific CIDR blocks
#     - Only requests from allowed IPs reach service
#     - Improves security (whitelist based)
#
# ============================================================================
# USEFUL KUBECTL COMMANDS
# ============================================================================
#
# Create Services:
#   kubectl apply -f service.yml
#
# View Services:
#   kubectl get service
#   kubectl get svc
#   kubectl get svc -o wide
#   kubectl describe service myservice-loadbalancer
#   kubectl get svc myservice-loadbalancer -o yaml
#
# View Service Endpoints:
#   kubectl get endpoints myservice-clusterip  # Shows backend pods
#   kubectl describe endpoints myservice-clusterip
#
# Test Service Connectivity:
#   kubectl run -it --rm debug --image=busybox --restart=Never -- sh
#   # Inside pod shell:
#   wget -O- http://myservice-clusterip:1111
#   nslookup myservice-clusterip
#   nslookup myservice-clusterip.default.svc.cluster.local
#
# Port Forwarding (Testing):
#   kubectl port-forward service/myservice-clusterip 1111:1111
#   kubectl port-forward service/myservice-nodeport 1111:1111
#   # Then access via localhost:1111
#
# Check External IP Status:
#   kubectl get service myservice-loadbalancer
#   # Watch for EXTERNAL-IP to change from <pending> to actual IP
#   kubectl get service myservice-loadbalancer --watch
#
# Access Service from Outside:
#   # ClusterIP: Not possible (internal only)
#   # NodePort: curl <NodeIP>:30001
#   # LoadBalancer: curl <ExternalIP>:1111
#
# View Service Logs:
#   kubectl logs -l app=python-app
#   kubectl logs -l app=python-app -f  # Follow logs
#
# Delete Service:
#   kubectl delete service myservice-loadbalancer
#
# Update Service:
#   kubectl patch service myservice-clusterip -p '{"spec":{"sessionAffinity":"ClientIP"}}'
#
# ============================================================================
# AWS SPECIFIC COMMANDS (LoadBalancer)
# ============================================================================
#
# View AWS Load Balancer Status:
#   kubectl get service myservice-loadbalancer
#   # Wait for EXTERNAL-IP to be assigned (shows AWS LB DNS name)
#
# Describe AWS Load Balancer Details:
#   kubectl describe service myservice-loadbalancer
#   # Shows AWS annotations and load balancer configuration
#
# Set AWS Load Balancer Type:
#   # Add annotation: service.spec.aws_load_balancer_type: nlb (Network Load Balancer)
#   # Default is Classic Load Balancer
#
# ============================================================================
# CLOUD PROVIDER NOTES
# ============================================================================
#
# AWS:
#   - Classic Load Balancer (default)
#   - Network Load Balancer: Add annotation "service.spec.aws_load_balancer_type: nlb"
#   - Application Load Balancer: Use Ingress instead
#   - External IP shows load balancer DNS name
#
# GCP:
#   - Network Load Balancer provisioned automatically
#   - External IP assigned from GCP network
#   - Cloud Armor integration available
#
# Azure:
#   - Azure Load Balancer provisioned
#   - Public IP assigned
#   - NSG rules may be needed for traffic
#
# On-Premises (No Cloud Provider):
#   - LoadBalancer type doesn't work without support
#   - Use NodePort or Ingress instead
#   - Or use MetalLB for bare metal load balancing
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Service has no endpoints?
#   - Check selector labels match pod labels
#   - kubectl get pods -l app=python-app
#   - Verify pod labels: kubectl describe pod <pod-name>
#
# LoadBalancer stuck on <pending>?
#   - Check if cloud provider is configured
#   - Check cloud provider quota/permissions
#   - Check cloud provider logs
#
# Cannot reach service from external client?
#   - For ClusterIP: Not accessible externally (use port-forward)
#   - For NodePort: Check firewall, verify node port is accessible
#   - For LoadBalancer: Check external IP assigned, check security groups
#
# Connection refused?
#   - Container not running or listening on targetPort
#   - Wrong targetPort specified
#   - Container process crashed
#
# DNS not resolving service name?
#   - Check CoreDNS pod is running: kubectl get pods -n kube-system
#   - Try full DNS name: myservice-clusterip.default.svc.cluster.local
#
# ============================================================================
